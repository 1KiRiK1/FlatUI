[mod-setting-description]
FUI_UI_style=Changes the interface style. Select "Default" to keep the original look.
FUI_main_color=Changes the main color of interface elements.\nWorks only in transparent mode.
FUI_set_add_color=Changes the secondary color of elements. Select "Custom" to set your own color.\nWorks only in transparent mode.
FUI_additional_color=Changes the custom secondary color. Select the desired option in the setting above.\nWorks only in transparent mode.
FUI_invert_color=Inverts text and icon colors on some buttons.\nEnable for the standard dark transparent interface.
FUI_inventory_width=Changes the width of the player's inventory, containers, and some other windows.\nIt is recommended to use the standard 10 slots.
FUI_recipe_width=Changes the width of the recipe window.\nFor large modpacks, it is recommended to increase to 17 slots.
FUI_group_button_width=Changes the size of recipe group buttons in the recipe window.\nFor large modpacks, it is recommended to reduce to 50 pixels.
FUI_health_bar=Changes the appearance of the health bar for buildings and enemies.
FUI_cursor_boxes=Changes the box around the object under the cursor.
FUI_indication=Changes the appearance of indicators on inserters, combinators, drills, and other devices.
FUI_alert_arrow=Changes the appearance of the arrow that appears at the edge of the screen.
FUI_underground_sprite=Changes the appearance of underground connection indicators for belts, pipes, and gates.
FUI_otherUI=Changes other interface elements: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Adds an indicator for the maximum underground belt length.
FUI_pipe_max_distance=Adds an indicator for the maximum underground pipe length.
FUI_lmine_radius=Adds an indicator for the mine trigger radius.
FUI_lamp_light_radius=Adds an indicator for the lamp light radius.
FUI_radar_radius=Adds an indicator for the radar's permanent coverage radius.

