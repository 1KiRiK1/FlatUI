[mod-setting-description]
FUI_UI_style=Изменяет стиль интерфейса. Выберите «Стандартный», чтобы оставить оригинальный вид.
FUI_main_color=Изменяет основной цвет элементов интерфейса.\nРаботает только в прозрачном режиме.
FUI_set_add_color=Изменяет дополнительный цвет элементов. Выберите «Пользовательский» для настройки своего цвета.\nРаботает только в прозрачном режиме.
FUI_additional_color=Изменяет пользовательский дополнительный цвет. Выберите нужный вариант в настройке выше.\nРаботает только в прозрачном режиме.
FUI_invert_color=Инвертирует цвет текста и иконок на некоторых кнопках.\nВключите для стандартного тёмного прозрачного интерфейса.
FUI_inventory_width=Изменяет ширину окна инвентаря игрока, контейнеров и некоторых других окон.\nРекомендуется использовать стандартные 10 ячеек.
FUI_recipe_width=Изменяет ширину окна рецептов.\nДля больших модпаков рекомендуется увеличить до 17 ячеек.
FUI_group_button_width=Изменяет размер кнопок групп рецептов в окне рецептов.\nДля больших модпаков рекомендуется уменьшить до 50 пикселей.
FUI_health_bar=Изменяет вид шкалы здоровья у построек и врагов.
FUI_cursor_boxes=Изменяет рамку вокруг объекта под курсором.
FUI_indication=Изменяет вид индикаторов у манипуляторов, комбинаторов, буров и т. д.
FUI_alert_arrow=Изменяет вид стрелки, которая появляется на краю экрана.
FUI_underground_sprite=Изменяет вид индикаторов подземных соединений, труб и ворот.
FUI_otherUI=Изменяет дополнительные элементы интерфейса: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.

