[mod-setting-description]
FUI_UI_style=Змінює стиль інтерфейсу. Виберіть «Стандартний», щоб залишити оригінальний вигляд.
FUI_main_color=Змінює основний колір елементів інтерфейсу.\nПрацює лише в прозорому режимі.
FUI_set_add_color=Змінює додатковий колір елементів. Виберіть «Користувацький» для налаштування свого кольору.\nПрацює лише в прозорому режимі.
FUI_additional_color=Змінює користувацький додатковий колір. Виберіть потрібний варіант у налаштуванні вище.\nПрацює лише в прозорому режимі.
FUI_invert_color=Інвертує колір тексту та іконок на деяких кнопках.\nУвімкніть для стандартного темного прозорого інтерфейсу.
FUI_inventory_width=Змінює ширину вікна інвентарю гравця, контейнерів і деяких інших вікон.\nРекомендується використовувати стандартні 10 слотів.
FUI_recipe_width=Змінює ширину вікна рецептів.\nДля великих модпаків рекомендується збільшити до 17 слотів.
FUI_group_button_width=Змінює розмір кнопок груп рецептів у вікні рецептів.\nДля великих модпаків рекомендується зменшити до 50 пікселів.
FUI_health_bar=Змінює вигляд шкали здоров'я у споруд і ворогів.
FUI_cursor_boxes=Змінює рамку навколо об'єкта під курсором.
FUI_indication=Змінює вигляд індикаторів на маніпуляторах, комбінаторах, бурах та інших пристроях.
FUI_alert_arrow=Змінює вигляд стрілки, яка з'являється на краю екрана.
FUI_underground_sprite=Змінює вигляд індикаторів підземних з'єднань, труб і воріт.
FUI_otherUI=Змінює інші елементи інтерфейсу: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Додає індикатор максимальної довжини підземного конвеєра.
FUI_pipe_max_distance=Додає індикатор максимальної довжини підземної труби.
FUI_lmine_radius=Додає індикатор радіуса спрацювання міни.
FUI_lamp_light_radius=Додає індикатор радіуса освітлення лампи.
FUI_radar_radius=Додає індикатор радіуса постійного огляду радара.

