[mod-setting-description]
FUI_UI_style=インターフェーススタイルを変更します。「標準」を選択すると元の外観を維持します。
FUI_main_color=インターフェース要素のメインカラーを変更します。\n透明モードでのみ機能します。
FUI_set_add_color=要素のサブカラーを変更します。「カスタム」を選択して自分の色を設定できます。\n透明モードでのみ機能します。
FUI_additional_color=カスタムサブカラーを変更します。上記の設定で希望のオプションを選択してください。\n透明モードでのみ機能します。
FUI_invert_color=一部のボタンでテキストとアイコンの色を反転します。\n標準のダーク透明インターフェースで有効にしてください。
FUI_inventory_width=プレイヤーのインベントリ、コンテナ、その他の一部のウィンドウの幅を変更します。\n標準の10スロットを使用することを推奨します。
FUI_recipe_width=レシピウィンドウの幅を変更します。\n大規模なModパックでは17スロットへの拡大を推奨します。
FUI_group_button_width=レシピウィンドウ内のレシピグループボタンのサイズを変更します。\n大規模なModパックでは50ピクセルへの縮小を推奨します。
FUI_health_bar=建物や敵のヘルスバーの外観を変更します。
FUI_cursor_boxes=カーソル下のオブジェクトの周囲のボックスを変更します。
FUI_indication=インサーター、コンビネーター、ドリルなどのインジケーターの外観を変更します。
FUI_alert_arrow=画面端に表示される矢印の外観を変更します。
FUI_underground_sprite=ベルト、パイプ、ゲートの地下接続インジケーターの外観を変更します。
FUI_otherUI=その他のインターフェース要素（cancel、slot、short-indication-line、short-indication-line-green、too-far、no-recipe、speech_bubble、gui-arrow、fluid-indication-arrow、fluid-indication-arrow-both-ways、rail-placement-indicators、rail-planner-indication-arrow、rail-planner-indication-arrow-anchored、rail-planner-indication-arrow-too-far）を変更します。
FUI_ubelt_max_distance=地下ベルトの最大長インジケーターを追加します。
FUI_pipe_max_distance=地下パイプの最大長インジケーターを追加します。
FUI_lmine_radius=地雷の作動半径インジケーターを追加します。
FUI_lamp_light_radius=ランプの照明半径インジケーターを追加します。
FUI_radar_radius=レーダーの永続カバー半径インジケーターを追加します。

