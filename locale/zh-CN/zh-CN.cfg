[mod-setting-description]
FUI_UI_style=更改界面样式。选择“标准”以保留原始外观。
FUI_main_color=更改界面元素的主色。\n仅在透明模式下生效。
FUI_set_add_color=更改元素的辅助色。选择“自定义”以设置自己的颜色。\n仅在透明模式下生效。
FUI_additional_color=更改自定义辅助色。在上方设置中选择所需选项。\n仅在透明模式下生效。
FUI_invert_color=反转某些按钮上的文本和图标颜色。\n为标准的深色透明界面启用。
FUI_inventory_width=更改玩家物品栏、容器及其他一些窗口的宽度。\n建议使用标准的10个格子。
FUI_recipe_width=更改配方窗口的宽度。\n对于大型模组包，建议增加到17个格子。
FUI_group_button_width=更改配方窗口中配方分组按钮的大小。\n对于大型模组包，建议减小到50像素。
FUI_health_bar=更改建筑和敌人的生命值条外观。
FUI_cursor_boxes=更改光标下对象周围的框。
FUI_indication=更改机械臂、运算器、钻机等设备上的指示器外观。
FUI_alert_arrow=更改屏幕边缘出现的箭头外观。
FUI_underground_sprite=更改传送带、管道和闸门的地下连接指示器外观。
FUI_otherUI=更改其他界面元素：cancel、slot、short-indication-line、short-indication-line-green、too-far、no-recipe、speech_bubble、gui-arrow、fluid-indication-arrow、fluid-indication-arrow-both-ways、rail-placement-indicators、rail-planner-indication-arrow、rail-planner-indication-arrow-anchored、rail-planner-indication-arrow-too-far。
FUI_ubelt_max_distance=添加地下传送带最大长度指示器。
FUI_pipe_max_distance=添加地下管道最大长度指示器。
FUI_lmine_radius=添加地雷触发半径指示器。
FUI_lamp_light_radius=添加灯照明半径指示器。
FUI_radar_radius=添加雷达永久覆盖半径指示器。

