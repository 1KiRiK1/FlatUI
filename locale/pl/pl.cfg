[mod-setting-description]
FUI_UI_style=Zmienia styl interfejsu. Wybierz „Standardowy”, aby zachować oryginalny wygląd.
FUI_main_color=Zmienia kolor główny elementów interfejsu.\nDziała tylko w trybie przezroczystym.
FUI_set_add_color=Zmienia kolor dodatkowy elementów. Wybierz „Niestandardowy”, aby ustawić własny kolor.\nDziała tylko w trybie przezroczystym.
FUI_additional_color=Zmienia niestandardowy kolor dodatkowy. Wybierz odpowiednią opcję w ustawieniu powyżej.\nDziała tylko w trybie przezroczystym.
FUI_invert_color=Odwraca kolory tekstu i ikon na niektórych przyciskach.\nWłącz dla standardowego ciemnego przezroczystego interfejsu.
FUI_inventory_width=Zmienia szerokość okna ekwipunku gracza, kontenerów i niektórych innych okien.\nZaleca się używanie standardowych 10 slotów.
FUI_recipe_width=Zmienia szerokość okna receptur.\nDla dużych pakietów modów zaleca się zwiększenie do 17 slotów.
FUI_group_button_width=Zmienia rozmiar przycisków grup receptur w oknie receptur.\nDla dużych pakietów modów zaleca się zmniejszenie do 50 pikseli.
FUI_health_bar=Zmienia wygląd paska zdrowia budynków i wrogów.
FUI_cursor_boxes=Zmienia ramkę wokół obiektu pod kursorem.
FUI_indication=Zmienia wygląd wskaźników na inserterach, kombinatorach, wiertłach i innych urządzeniach.
FUI_alert_arrow=Zmienia wygląd strzałki pojawiającej się na krawędzi ekranu.
FUI_underground_sprite=Zmienia wygląd wskaźników połączeń podziemnych dla taśm, rur i bram.
FUI_otherUI=Zmienia inne elementy interfejsu: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Dodaje wskaźnik maksymalnej długości podziemnego taśmociągu.
FUI_pipe_max_distance=Dodaje wskaźnik maksymalnej długości podziemnej rury.
FUI_lmine_radius=Dodaje wskaźnik promienia aktywacji min.
FUI_lamp_light_radius=Dodaje wskaźnik promienia oświetlenia lampy.
FUI_radar_radius=Dodaje wskaźnik promienia stałego zasięgu radaru.

