[mod-setting-description]
FUI_UI_style=Altera o estilo da interface. Selecione «Padrão» para manter a aparência original.
FUI_main_color=Altera a cor principal dos elementos da interface.\nFunciona apenas no modo transparente.
FUI_set_add_color=Altera a cor secundária dos elementos. Selecione «Personalizado» para definir sua própria cor.\nFunciona apenas no modo transparente.
FUI_additional_color=Altera a cor secundária personalizada. Selecione a opção desejada na configuração acima.\nFunciona apenas no modo transparente.
FUI_invert_color=Inverte a cor do texto e ícones em alguns botões.\nAtive para a interface transparente escura padrão.
FUI_inventory_width=Altera a largura da janela de inventário do jogador, contêineres e algumas outras janelas.\nRecomenda-se usar os 10 slots padrão.
FUI_recipe_width=Altera a largura da janela de receitas.\nPara grandes modpacks, recomenda-se aumentar para 17 slots.
FUI_group_button_width=Altera o tamanho dos botões de grupos de receitas na janela de receitas.\nPara grandes modpacks, recomenda-se reduzir para 50 pixels.
FUI_health_bar=Altera a aparência da barra de vida em edifícios e inimigos.
FUI_cursor_boxes=Altera a caixa ao redor do objeto sob o cursor.
FUI_indication=Altera a aparência dos indicadores em inseridores, combinadores, perfuradores e outros dispositivos.
FUI_alert_arrow=Altera a aparência da seta que aparece na borda da tela.
FUI_underground_sprite=Altera a aparência dos indicadores de conexões subterrâneas para esteiras, canos e comportas.
FUI_otherUI=Altera outros elementos da interface: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Adiciona um indicador de comprimento máximo de esteira subterrânea.
FUI_pipe_max_distance=Adiciona um indicador de comprimento máximo de cano subterrâneo.
FUI_lmine_radius=Adiciona um indicador do raio de ativação de minas.
FUI_lamp_light_radius=Adiciona um indicador do raio de iluminação de lâmpadas.
FUI_radar_radius=Adiciona um indicador do raio de cobertura permanente do radar.

