[mod-setting-description]
FUI_UI_style=Cambia el estilo de la interfaz. Selecciona «Estándar» para mantener el aspecto original.
FUI_main_color=Cambia el color principal de los elementos de la interfaz.\nFunciona solo en modo transparente.
FUI_set_add_color=Cambia el color secundario de los elementos. Selecciona «Personalizado» para definir tu propio color.\nFunciona solo en modo transparente.
FUI_additional_color=Cambia el color secundario personalizado. Selecciona la opción deseada en la configuración anterior.\nFunciona solo en modo transparente.
FUI_invert_color=Invierte el color del texto y los iconos en algunos botones.\nActívalo para la interfaz transparente oscura estándar.
FUI_inventory_width=Cambia el ancho de la ventana de inventario del jugador, contenedores y otras ventanas.\nSe recomienda usar las 10 celdas estándar.
FUI_recipe_width=Cambia el ancho de la ventana de recetas.\nPara modpacks grandes, se recomienda aumentar a 17 celdas.
FUI_group_button_width=Cambia el tamaño de los botones de grupos de recetas en la ventana de recetas.\nPara modpacks grandes, se recomienda reducir a 50 píxeles.
FUI_health_bar=Cambia el aspecto de la barra de salud en edificios y enemigos.
FUI_cursor_boxes=Cambia el marco alrededor del objeto bajo el cursor.
FUI_indication=Cambia el aspecto de los indicadores en insertadores, combinadores, perforadoras y otros dispositivos.
FUI_alert_arrow=Cambia el aspecto de la flecha que aparece en el borde de la pantalla.
FUI_underground_sprite=Cambia el aspecto de los indicadores de conexiones subterráneas de cintas, tuberías y compuertas.
FUI_otherUI=Cambia otros elementos de la interfaz: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Añade un indicador de longitud máxima de cinta subterránea.
FUI_pipe_max_distance=Añade un indicador de longitud máxima de tubería subterránea.
FUI_lmine_radius=Añade un indicador del radio de activación de minas.
FUI_lamp_light_radius=Añade un indicador del radio de iluminación de lámparas.
FUI_radar_radius=Añade un indicador del radio de cobertura permanente del radar.

