[mod-setting-description]
FUI_UI_style=Ändert den Oberflächenstil. Wähle „Standard“, um das ursprüngliche Aussehen zu behalten.
FUI_main_color=Ändert die Hauptfarbe der Oberflächenelemente.\nFunktioniert nur im transparenten Modus.
FUI_set_add_color=Ändert die Sekundärfarbe der Elemente. Wähle „Benutzerdefiniert“, um deine eigene Farbe festzulegen.\nFunktioniert nur im transparenten Modus.
FUI_additional_color=Ändert die benutzerdefinierte Sekundärfarbe. Wähle die gewünschte Option in der obigen Einstellung.\nFunktioniert nur im transparenten Modus.
FUI_invert_color=Invertiert die Text- und Symbolfarben auf einigen Schaltflächen.\nAktiviere für die standardmäßige dunkle transparente Oberfläche.
FUI_inventory_width=Ändert die Breite des Inventarfensters, von Containern und einigen anderen Fenstern.\nEs wird empfohlen, die standardmäßigen 10 Slots zu verwenden.
FUI_recipe_width=Ändert die Breite des Rezeptfensters.\nFür große Modpacks wird empfohlen, auf 17 Slots zu erhöhen.
FUI_group_button_width=Ändert die Größe der Rezeptgruppen-Buttons im Rezeptfenster.\nFür große Modpacks wird empfohlen, auf 50 Pixel zu reduzieren.
FUI_health_bar=Ändert das Aussehen des Gesundheitsbalkens bei Gebäuden und Gegnern.
FUI_cursor_boxes=Ändert den Rahmen um das Objekt unter dem Cursor.
FUI_indication=Ändert das Aussehen der Indikatoren an Insertern, Kombinatoren, Bohrern und anderen Geräten.
FUI_alert_arrow=Ändert das Aussehen des Pfeils, der am Bildschirmrand erscheint.
FUI_underground_sprite=Ändert das Aussehen der Indikatoren für Untergrundverbindungen von Förderbändern, Rohren und Toren.
FUI_otherUI=Ändert andere Oberflächenelemente: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Fügt einen Indikator für die maximale Länge von Untergrundförderbändern hinzu.
FUI_pipe_max_distance=Fügt einen Indikator für die maximale Länge von Untergrundrohren hinzu.
FUI_lmine_radius=Fügt einen Indikator für den Zündradius von Minen hinzu.
FUI_lamp_light_radius=Fügt einen Indikator für den Leuchtradius von Lampen hinzu.
FUI_radar_radius=Fügt einen Indikator für den permanenten Abdeckungsradius von Radaren hinzu.

