[mod-setting-description]
FUI_UI_style=Modifica lo stile dell'interfaccia. Seleziona «Standard» per mantenere l'aspetto originale.
FUI_main_color=Modifica il colore principale degli elementi dell'interfaccia.\nFunziona solo in modalità trasparente.
FUI_set_add_color=Modifica il colore secondario degli elementi. Seleziona «Personalizzato» per impostare il tuo colore.\nFunziona solo in modalità trasparente.
FUI_additional_color=Modifica il colore secondario personalizzato. Seleziona l'opzione desiderata nell'impostazione sopra.\nFunziona solo in modalità trasparente.
FUI_invert_color=Inverte il colore del testo e delle icone su alcuni pulsanti.\nAttiva per l'interfaccia trasparente scura standard.
FUI_inventory_width=Modifica la larghezza della finestra dell'inventario del giocatore, dei container e di alcune altre finestre.\nSi consiglia di utilizzare i 10 slot standard.
FUI_recipe_width=Modifica la larghezza della finestra delle ricette.\nPer grandi modpack, si consiglia di aumentare a 17 slot.
FUI_group_button_width=Modifica la dimensione dei pulsanti dei gruppi di ricette nella finestra delle ricette.\nPer grandi modpack, si consiglia di ridurre a 50 pixel.
FUI_health_bar=Modifica l'aspetto della barra della salute per edifici e nemici.
FUI_cursor_boxes=Modifica il quadrato attorno all'oggetto sotto il cursore.
FUI_indication=Modifica l'aspetto degli indicatori su inseritori, combinatori, trivelle e altri dispositivi.
FUI_alert_arrow=Modifica l'aspetto della freccia che appare sul bordo dello schermo.
FUI_underground_sprite=Modifica l'aspetto degli indicatori di connessioni sotterranee per nastri, tubi e cancelli.
FUI_otherUI=Modifica altri elementi dell'interfaccia: cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Aggiunge un indicatore della lunghezza massima dei nastri sotterranei.
FUI_pipe_max_distance=Aggiunge un indicatore della lunghezza massima dei tubi sotterranei.
FUI_lmine_radius=Aggiunge un indicatore del raggio di attivazione delle mine.
FUI_lamp_light_radius=Aggiunge un indicatore del raggio di illuminazione delle lampade.
FUI_radar_radius=Aggiunge un indicatore del raggio di copertura permanente del radar.

