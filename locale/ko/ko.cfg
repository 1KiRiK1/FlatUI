[mod-description]
FlatUI=인터페이스 외관(창 스타일, 색상, 표시기 등)을 변경합니다. 취향에 맞게 커스터마이즈할 수 있습니다.

[mod-setting-name]
FUI_UI_style=인터페이스 스타일
FUI_main_color=  ┣ 기본 색상
FUI_set_add_color=  ┣ 보조 색상
FUI_additional_color=  ┣ 사용자 정의 보조 색상
FUI_invert_color=  ┗ 요소 색상 반전 [img=utility/warning_icon]
FUI_inventory_width=인벤토리 창 너비
FUI_recipe_width=레시피 창 너비
FUI_group_button_width=레시피 그룹 버튼 크기
FUI_health_bar=체력 바
FUI_cursor_boxes=커서 박스
FUI_indication=「삼각형」 및 「선」 표시기
FUI_indication_arrow_tint=  ┣ 「삼각형」 표시기 색상
FUI_indication_line_tint=  ┗ 「선」 표시기 색상
FUI_alert_arrow=경고 화살표
FUI_alert_arrow_scale=  ┣ 경고 화살표 크기
FUI_alert_arrow_tint=  ┗ 경고 화살표 색상
FUI_underground_sprite=지하 연결 표시기
FUI_otherUI=기타 요소
FUI_ubelt_max_distance=지하 벨트 최대 길이
FUI_pipe_max_distance=지하 파이프 최대 길이
FUI_lmine_radius=지뢰 작동 반경
FUI_lamp_light_radius=램프 조명 반경
FUI_radar_radius=레이더 커버리지 반경

[mod-setting-description]
FUI_UI_style=인터페이스 스타일을 변경합니다. 「기본」을 선택하면 원래 모양을 유지합니다.
FUI_main_color=인터페이스 요소의 기본 색상을 변경합니다.\n투명 모드에서만 작동합니다.
FUI_set_add_color=요소의 보조 색상을 변경합니다. 「사용자 정의」를 선택하여 자신만의 색상을 설정할 수 있습니다.\n투명 모드에서만 작동합니다.
FUI_additional_color=사용자 정의 보조 색상을 변경합니다. 위의 설정에서 원하는 옵션을 선택하세요.\n투명 모드에서만 작동합니다.
FUI_invert_color=일부 버튼의 텍스트 및 아이콘 색상을 반전합니다.\n표준 다크 투명 인터페이스에서 활성화하세요.
FUI_inventory_width=플레이어 인벤토리, 컨테이너 및 일부 다른 창의 너비를 변경합니다.\n표준 10슬롯을 사용하는 것이 좋습니다.
FUI_recipe_width=레시피 창의 너비를 변경합니다.\n대규모 모드팩의 경우 17슬롯으로 늘리는 것이 좋습니다.
FUI_group_button_width=레시피 창 내 레시피 그룹 버튼의 크기를 변경합니다.\n대규모 모드팩의 경우 50픽셀로 줄이는 것이 좋습니다.
FUI_health_bar=건물 및 적의 체력 바 모양을 변경합니다.
FUI_cursor_boxes=커서 아래 객체 주변의 박스를 변경합니다.
FUI_indication=인서터, 콤비네이터, 드릴 등의 표시기 모양을 변경합니다.
FUI_alert_arrow=화면 가장자리에 나타나는 화살표의 모양을 변경합니다.
FUI_underground_sprite=벨트, 파이프, 게이트의 지하 연결 표시기 모양을 변경합니다.
FUI_otherUI=기타 인터페이스 요소(cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far)를 변경합니다.
FUI_ubelt_max_distance=지하 벨트 최대 길이 표시기를 추가합니다.
FUI_pipe_max_distance=지하 파이프 최대 길이 표시기를 추가합니다.
FUI_lmine_radius=지뢰 작동 반경 표시기를 추가합니다.
FUI_lamp_light_radius=램프 조명 반경 표시기를 추가합니다.
FUI_radar_radius=레이더 영구 커버리지 반경 표시기를 추가합니다.

