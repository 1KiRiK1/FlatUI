[mod-setting-description]
FUI_UI_style=Modifie le style de l'interface. Sélectionnez « Standard » pour conserver l'apparence d'origine.
FUI_main_color=Modifie la couleur principale des éléments de l'interface.\nFonctionne uniquement en mode transparent.
FUI_set_add_color=Modifie la couleur secondaire des éléments. Sélectionnez « Personnalisé » pour définir votre propre couleur.\nFonctionne uniquement en mode transparent.
FUI_additional_color=Modifie la couleur secondaire personnalisée. Sélectionnez l'option souhaitée dans le paramètre ci-dessus.\nFonctionne uniquement en mode transparent.
FUI_invert_color=Inverse la couleur du texte et des icônes sur certains boutons.\nActivez pour l'interface transparente sombre standard.
FUI_inventory_width=Modifie la largeur de la fenêtre d'inventaire du joueur, des conteneurs et de certaines autres fenêtres.\nIl est recommandé d'utiliser les 10 cases standard.
FUI_recipe_width=Modifie la largeur de la fenêtre des recettes.\nPour les gros modpacks, il est recommandé d'augmenter à 17 cases.
FUI_group_button_width=Modifie la taille des boutons des groupes de recettes dans la fenêtre des recettes.\nPour les gros modpacks, il est recommandé de réduire à 50 pixels.
FUI_health_bar=Modifie l'apparence de la barre de santé des bâtiments et des ennemis.
FUI_cursor_boxes=Modifie le cadre autour de l'objet sous le curseur.
FUI_indication=Modifie l'apparence des indicateurs sur les inserters, les combinators, les foreuses et autres dispositifs.
FUI_alert_arrow=Modifie l'apparence de la flèche qui apparaît en bord d'écran.
FUI_underground_sprite=Modifie l'apparence des indicateurs de connexions souterraines pour les convoyeurs, tuyaux et portes.
FUI_otherUI=Modifie d'autres éléments de l'interface : cancel, slot, short-indication-line, short-indication-line-green, too-far, no-recipe, speech_bubble, gui-arrow, fluid-indication-arrow, fluid-indication-arrow-both-ways, rail-placement-indicators, rail-planner-indication-arrow, rail-planner-indication-arrow-anchored, rail-planner-indication-arrow-too-far.
FUI_ubelt_max_distance=Ajoute un indicateur de longueur maximale pour les convoyeurs souterrains.
FUI_pipe_max_distance=Ajoute un indicateur de longueur maximale pour les tuyaux souterrains.
FUI_lmine_radius=Ajoute un indicateur du rayon de déclenchement des mines.
FUI_lamp_light_radius=Ajoute un indicateur du rayon d'éclairage des lampes.
FUI_radar_radius=Ajoute un indicateur du rayon de couverture permanente des radars.

